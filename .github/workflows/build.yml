name: Build & deploy availability page

# A single workflow (DESIGN-DOC.md, eng review D2): scheduled every ~15
# minutes, plus on push (so config/code changes deploy at once) and a
# manual button for the first build. No instant on-change trigger.
on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches: [main]
  workflow_dispatch: {}

# Least privilege: read the repo, publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; a newer run supersedes an in-flight one.
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Gate: a broken build script must not deploy. If tests fail the
      # job stops here and the last successful deploy stays live.
      - name: Run tests
        run: node --test

      - name: Build the static site
        run: node build.mjs
        env:
          # The only secret. Add it under Settings → Secrets and variables
          # → Actions. The Airtable base ID is non-secret config.mjs.
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}

      - name: Save the double-booking report for the conflict-check job
        uses: actions/upload-artifact@v4
        with:
          name: conflict-report
          path: conflict-report.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Fails — which makes GitHub email you — when Airtable contains a
  # double-booking. Runs independently of deploy, so a conflict never
  # blocks the page from updating; it just raises the alarm.
  conflict-check:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Download the double-booking report
        uses: actions/download-artifact@v4
        with:
          name: conflict-report
      - name: Fail if any bike is double-booked
        run: |
          count=$(jq '.conflicts | length' conflict-report.json)
          if [ "$count" -gt 0 ]; then
            echo "::error::$count double-booking(s) found in Airtable — fix them now"
            jq -r '.conflicts[] | "  x " + .' conflict-report.json
            exit 1
          fi
          echo "No double-bookings. OK"
